publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.3
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
