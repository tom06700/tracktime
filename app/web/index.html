<!DOCTYPE html>
<html lang="fr">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="TrackTime — suivi de séries et films, 100 % local.">
  <meta name="theme-color" content="#0d1017">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TrackTime">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>TrackTime</title>
  <link rel="manifest" href="manifest.json">
  <style>html, body { background: #0d1017; margin: 0; }</style>
</head>
<body>
  <script>
    {{flutter_js}}
    {{flutter_build_config}}
    // CanvasKit auto-hébergé (pas de dépendance au CDN gstatic).
    _flutter.loader.load({
      config: { canvasKitBaseUrl: "canvaskit/" }
    });
  </script>
</body>
</html>
